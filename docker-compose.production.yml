version: '3'

volumes:
  pg_data:
  backend_static:
  frontend_static:
  media:

services:
  postgres:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: lo0ken/kittygram_backend
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - backend_static:/app/collected_static
      - media:/app/media

  frontend:
    env_file: .env
    image: lo0ken/kittygram_frontend
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - frontend_static:/frontend_static

  gateway:
    image: lo0ken/kittygram_gateway
    ports:
      - "8000:80"
    volumes:
      - backend_static:/static
      - frontend_static:/frontend_static
      - media:/media
    depends_on:
      - backend
      - frontend